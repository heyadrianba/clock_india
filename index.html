<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Liquid Glass Uhren</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    gap: 12px;
    justify-content: center;
    align-items: center;
    padding: 24px 16px;
    box-sizing: border-box;
  }

  .clock {
    position: relative;
    width: 200px;
    padding: 20px 16px;
    border-radius: 24px;
    text-align: center;
    color: #1c1c1e;
    background: linear-gradient(135deg, rgba(255,255,255,0.75), rgba(255,255,255,0.35));
    backdrop-filter: blur(18px) saturate(180%);
    -webkit-backdrop-filter: blur(18px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow:
      0 8px 32px rgba(0,0,0,0.10),
      inset 0 1px 1px rgba(255,255,255,0.9),
      inset 0 -8px 20px rgba(255,255,255,0.1);
    overflow: hidden;
  }

  .clock::before {
    content: "";
    position: absolute;
    top: -40%;
    left: -20%;
    width: 140%;
    height: 80%;
    background: radial-gradient(ellipse at top, rgba(255,255,255,0.7), transparent 70%);
    pointer-events: none;
  }

  .flag {
    font-size: 28px;
    margin-bottom: 6px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
  }

  .label {
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .time {
    font-size: 38px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 1px 2px rgba(0,0,0,0.08);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .date {
    margin-top: 8px;
    font-size: 12px;
    opacity: 0.55;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="clock">
    <div class="flag">🇩🇪</div>
    <div class="label">Deutschland</div>
    <div class="time" id="de-time">--:--:--</div>
    <div class="date" id="de-date">–</div>
  </div>

  <div class="clock">
    <div class="flag">🇮🇳</div>
    <div class="label">Indien</div>
    <div class="time" id="in-time">--:--:--</div>
    <div class="date" id="in-date">–</div>
  </div>
</div>

<script>
  function update() {
    const now = new Date();

    const deTime = now.toLocaleTimeString('de-DE', { timeZone: 'Europe/Berlin', hour: '2-digit', minute: '2-digit' });
    const deDate = now.toLocaleDateString('de-DE', { timeZone: 'Europe/Berlin', weekday: 'short', day: '2-digit', month: '2-digit' });

    const inTime = now.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: false, hour: '2-digit', minute: '2-digit' });
    const inDate = now.toLocaleDateString('en-IN', { timeZone: 'Asia/Kolkata', weekday: 'short', day: '2-digit', month: '2-digit' });

    document.getElementById('de-time').textContent = deTime;
    document.getElementById('de-date').textContent = deDate;
    document.getElementById('in-time').textContent = inTime;
    document.getElementById('in-date').textContent = inDate;
  }

  update();
  setInterval(update, 1000);
</script>

</body>
</html>
